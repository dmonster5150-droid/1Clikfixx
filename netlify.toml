[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/public/index.html"
  status = 200

# optional redirect from subdomain to primary domain
[[redirects]]
  from = "https://1clikfixx.netlify.app/*"
  to = "https://www.1clikfix.com/:splat"
  status = 301
